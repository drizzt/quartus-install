# Quartus URL database for quartus-install.py
#
# This is the hand-curated list of supported Quartus versions.  Edit here
# (not the Python script) to add or fix a release.  Order of the
# [versions."..."] tables is the user-visible --list-versions order; keep
# it stable.
#
# Each [versions."KEY"] table has a "type":
#
#   type = "pro"
#     Generated by generate_pro_url(quartus_version, minor, revision).
#     Only quartus_version + minor + revision are needed.
#
#   type = "std"
#     Generated by generate_std_url(quartus_version, minor, revision,
#     edition, sim=, embed_edition=, arria10_single=).
#     Optional: sim (default "modelsim"; "questa" for >= 21.1),
#     embed_edition (default false), arria10_single (default false),
#     copy_parts_from + copy_parts (copy a few parts verbatim from another
#     version that wasn't rebuilt for a patch release).
#
#   type = "lite_from_std"
#     base = "<a std KEY>".  Lite shares Std device files; only the
#     installer (and Arria II) leaf differ - derived by string rewrite.
#
#   type = "copy"
#     base = "<another KEY>".  Full dict copy of base, then "override".
#
#   type = "explicit"
#     [versions."KEY".urls] sub-table of part = "url" (older releases with
#     too many quirks to fit a generator).
#
# Any entry may carry an optional [versions."KEY".override] sub-table of
# part = "url" merged on top after construction.

